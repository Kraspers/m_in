<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MIN Control</title><link rel="stylesheet" href="app.css"><style>body{background:#0f0f11;color:#fff}.admin-wrap{max-width:1100px;margin:0 auto;padding:20px}.admin-card{background:#1a1a1f;border:1px solid #2a2a33;border-radius:16px;padding:16px}.admin-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.metric{padding:14px;border-radius:12px;background:#15151a}.admin-hidden{display:none}.admin-layout{display:grid;grid-template-columns:240px 1fr;gap:14px}.sidebar button{width:100%;text-align:left;border:none;background:#1a1a1f;color:#fff;padding:12px;border-radius:10px;margin-bottom:8px}</style></head><body>
<div class="admin-wrap" id="admin-login">
  <div class="admin-card" style="max-width:420px;margin:80px auto;">
    <h2>Вход в панель</h2><input id="admin-pass" type="password" placeholder="Пароль" class="pe-field" style="width:100%;margin:10px 0"><button onclick="adminLogin()" id="admin-btn" style="background:#0078FF;color:#fff;border:none;border-radius:999px;padding:12px 18px;cursor:pointer">Войти</button><div id="admin-error" style="color:#ff6b6b;margin-top:8px"></div>
  </div>
</div>
<div class="admin-wrap admin-hidden" id="admin-app"><div class="admin-layout"><aside class="sidebar"><button onclick="showTab('dash')">Главная</button><button onclick="showTab('users')">Пользователи</button><button onclick="showTab('support')">Поддержка</button></aside><main><section id="tab-dash"><div class="admin-grid"><div class="metric">Пользователей: <b id="m-users">0</b></div><div class="metric">Онлайн: <b id="m-online">0</b></div><div class="metric">Сообщений: <b id="m-msg">0</b></div></div></section><section id="tab-users" class="admin-hidden"><div class="admin-card"><h3>Пользователи</h3><div id="users-list"></div></div></section><section id="tab-support" class="admin-hidden"><div class="admin-card">Раздел поддержки использует существующие чаты MIN в клиенте.</div></section></main></div></div>
<script>
const ADMIN_ROUTE_KEY='admin_token';
async function adminLogin(){const p=document.getElementById('admin-pass').value;const r=await fetch('/api/hidden-root/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:p})});const d=await r.json();if(!r.ok){document.getElementById('admin-error').textContent=d.error||'Ошибка';return;}localStorage.setItem(ADMIN_ROUTE_KEY,d.token);boot();}
function showTab(t){['dash','users','support'].forEach(k=>document.getElementById('tab-'+k).classList.toggle('admin-hidden',k!==t));}
async function api(path,opt={}){opt.headers={...(opt.headers||{}),'x-admin-token':localStorage.getItem(ADMIN_ROUTE_KEY)||''};const r=await fetch(path,opt);return {ok:r.ok,data:await r.json()};}
async function refresh(){const s=await api('/api/hidden-root/stats');if(s.ok){document.getElementById('m-users').textContent=s.data.totalUsers;document.getElementById('m-online').textContent=s.data.onlineUsers;document.getElementById('m-msg').textContent=s.data.totalMessages;}const u=await api('/api/hidden-root/users');if(u.ok){document.getElementById('users-list').innerHTML=u.data.items.map(x=>`<div class='metric' style='margin:8px 0'><b>${x.name}</b> @${x.username}<br><small>Был в сети: ${x.lastSeenAt||'—'}</small><br><button onclick="ban('${x.id}')">Бан</button> <button onclick="perm('${x.id}')">Перманент</button> <button onclick="unban('${x.id}')">Разбан</button></div>`).join('');}}
async function ban(id){const reason=prompt('Причина');if(!reason)return;await api('/api/hidden-root/users/'+id+'/ban',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reason,durationMinutes:60})});refresh();}
async function unban(id){await api('/api/hidden-root/users/'+id+'/unban',{method:'POST'});refresh();}
async function perm(id){const reason=prompt('Причина');if(!reason)return;await api('/api/hidden-root/users/'+id+'/ban',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reason,permanent:true})});refresh();}
function boot(){if(!localStorage.getItem(ADMIN_ROUTE_KEY))return;document.getElementById('admin-login').classList.add('admin-hidden');document.getElementById('admin-app').classList.remove('admin-hidden');refresh();setInterval(refresh,5000);}boot();
</script></body></html>
